---
include:
  - project: qorvo/tools/templates/ci-templates
    file: /templates/python-package.yml
    ref: v14

test-docs:
  stage: test
  script:
    - python3 -m pip install -U sphinx sphinx_rtd_theme myst-parser sphinx-panels
    - sphinx-build -b html docs/ public
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  tags:
    - check:generic

pages:
  stage: publish
  script:
    - python3 -m pip install -U sphinx sphinx_rtd_theme myst-parser sphinx-panels
    - sphinx-build -b html docs/ public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  tags:
    - check:generic
